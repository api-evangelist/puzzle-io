aid: puzzle-io
url: https://raw.githubusercontent.com/api-evangelist/puzzle-io/refs/heads/main/apis.yml
name: Puzzle
kind: company
description: Puzzle is real-time, AI-native accounting software for startups and accounting
  firms. It builds a continuously reconciled general ledger on top of connected Stripe,
  bank, card, and payroll data and surfaces financial statements plus startup metrics
  like burn, runway, and margin. The Puzzle API exposes that same real-time financial
  data hub and general ledger over a RESTful, OAuth 2.0-secured JSON interface. As
  of this catalog entry the API is in an active-development, partner-gated rollout,
  available to platform partners building embedded accounting and to large accounting
  or advisory firms; individual companies join a waitlist.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Accounting
