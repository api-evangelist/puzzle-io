- FOCUS
description: >-
  FinOps view of Puzzle spend. Puzzle is billed as a per-company monthly (or
  discounted annual) SaaS subscription across the Starter, Core, Complete, and
  Scale tiers, with AI features metered by monthly AI credits and the Starter
  free tier gated by a $20K cumulative transaction-volume threshold. The Puzzle
  API is not sold as a separately metered, self-serve product; API access is
  provisioned through the Partner Program on negotiated commercial terms, so
  API-specific charges are contract-based rather than usage-priced.
notes: >-
  There is no public per-call price for the Puzzle API. Cost management focuses
  on subscription tier selection, AI-credit consumption, and the transaction
  volume that moves a company off the free tier. Verify current rates on the
  pricing page during reconciliation.
sources:
- https://puzzle.io/pricing
- https://help.puzzle.io/en/articles/8891734-faq-pricing
