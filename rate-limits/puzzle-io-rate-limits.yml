specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Puzzle
providerId: puzzle-io
created: '2026-07-01'
modified: '2026-07-01'
reconciled: false
tags:
- Accounting
- Fintech
- Rate Limiting
- Quotas
- Throttling
description: >-
  Puzzle does not publish specific API rate-limit numbers in its public
  documentation. The API is a partner-gated, RESTful JSON interface issued
  through the Partner Program, and Puzzle advertises 99.9% API availability.
  Concrete request-per-minute, per-hour, or per-day limits are set per partner
  agreement during the technical review and are not documented publicly. Values
  below are placeholders describing the expected shape of Puzzle's throttling,
  not confirmed figures.
notes: >-
  No public rate-limit table exists. Confirm per-partner limits and any
  documented HTTP 429 behavior directly with Puzzle during partner onboarding.
sources:
- https://puzzle-api.readme.io/docs/welcome
- https://puzzle.io/solutions/api
- https://help.puzzle.io/en/articles/13623194-api-access-in-puzzle
responseCodes:
  throttled: 429
limits:
- name: Requests Per Minute (RPM)
  scope: partner
  metric: requests
  limit: see partner agreement
  notes: Not published; set per partner during technical review.
- name: Concurrent Requests
  scope: partner
  metric: concurrent
  limit: see partner agreement
  notes: Not published; large-scale portfolio partners are provisioned for high volume.
- name: Sync Frequency
  scope: company
  metric: syncs
  limit: see partner agreement
  notes: Upstream connection sync cadence is managed by Puzzle, not exposed as a client-side limit.
policies:
- name: Availability SLA
  description: Puzzle advertises 99.9% API availability for the partner API.
- name: Partner Provisioning
  description: Limits are negotiated per partner rather than published as fixed public tiers.
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor Retry-After on HTTP 429.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
